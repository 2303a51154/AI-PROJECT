<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SwiftDrive</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-10 rounded-2xl shadow-2xl max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-600 italic mb-2">SWIFTDRIVE</h1>
            <h2 class="text-3xl font-bold text-gray-900">Welcome Back</h2>
            <p class="text-gray-500 mt-2">Log in to manage your bookings</p>
        </div>

        <form class="space-y-5" onsubmit="handleLogin(event)">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase ml-1">Email Address</label>
                <input type="email" required class="w-full border p-3 rounded-xl outline-blue-500 bg-gray-50" placeholder="john@example.com">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase ml-1">Password</label>
                <input type="password" required class="w-full border p-3 rounded-xl outline-blue-500 bg-gray-50" placeholder="••••••••">
            </div>
            
            <div class="flex justify-between items-center text-sm">
                <label class="flex items-center text-gray-500 cursor-pointer">
                    <input type="checkbox" class="mr-2"> Remember me
                </label>
                <a href="#" class="text-blue-600 font-bold hover:underline">Forgot?</a>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition transform active:scale-95">
                Login
            </button>
        </form>

        <p class="text-center mt-8 text-gray-600 text-sm">
            Don't have an account? <a href="signup.html" class="text-blue-600 font-bold hover:underline">Sign Up</a>
        </p>
        
        <div class="mt-6 text-center">
            <a href="index.html" class="text-gray-400 text-xs hover:text-gray-800 transition">&larr; Back to Fleet</a>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault(); // Stops the form from refreshing the page
            alert("Login Successful! Welcome back.");
            window.location.href = "index.html"; // Navigates to the home page
        }
    </script>
</body>
</html>
